version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fastrouter
      POSTGRES_PASSWORD: fastrouter
      POSTGRES_DB: fastrouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://fastrouter:fastrouter@postgres:5432/litellm
      LITELLM_MASTER_KEY: sk-master-key-fastrouter
      UI_USERNAME: admin
      UI_PASSWORD: fastrouter-admin
      STORE_MODEL_IN_DB: "True"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    volumes:
      - ../fastrouter-oss/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - postgres

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://fastrouter:fastrouter@postgres:5432/fastrouter
      REDIS_URL: redis://redis:6379
      LITELLM_URL: http://litellm:4000
      JWT_SECRET: dev-secret-change-in-production
      ENCRYPTION_KEY: dev-32-byte-key-change-me-pls
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-price_}
      LITELLM_CONFIG_PATH: /app/litellm_config/config.yaml
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - litellm
    volumes:
      - ./backend:/app/backend
      - ../fastrouter-oss/litellm:/app/litellm_config
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
